<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ranking Prode 2026</title>
  <link rel="stylesheet" href="style.css">
</head>
<body data-page="ranking">
  <header class="hero compact-hero">
    <nav class="top-nav" aria-label="Navegación principal">
      <a class="nav-link" href="index.html">Cargar prode</a>
      <a class="nav-link" href="knockout.html">Eliminatorias</a>
      <a class="nav-link active" href="ranking.html">Ver ranking</a>
    </nav>
    <div class="hero-content">
      <p class="eyebrow">Tabla general</p>
      <h1>Ranking Prode 2026</h1>
      <p>Consultá por separado el histórico de fase de grupos y el ranking vivo de eliminatorias.</p>
    </div>
  </header>

  <main class="container">
    <section class="card">
      <div class="section-heading">
        <h2 id="rankingTitle">Ranking fase de grupos</h2>
        <button id="refreshRanking" type="button" class="secondary-button">Actualizar</button>
      </div>
      <div class="ranking-tabs" role="tablist" aria-label="Tipo de ranking">
        <button type="button" class="ranking-tab active" data-ranking-mode="groups" role="tab" aria-selected="true">Ranking fase de grupos</button>
        <button type="button" class="ranking-tab" data-ranking-mode="knockout" role="tab" aria-selected="false">Ranking eliminatorias</button>
      </div>
      <div id="rankingNotice" class="notice"></div>
      <div id="podium" class="podium" aria-live="polite"></div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Posición</th>
              <th>Nombre y Apellido</th>
              <th>Puntos</th>
              <th>Exactos</th>
              <th id="rankingSignHeader">Signos acertados</th>
              <th>Total de aciertos</th>
              <th>Detalle</th>
            </tr>
          </thead>
          <tbody id="rankingBody"></tbody>
        </table>
      </div>
    </section>
    <div id="message" class="message" role="status" aria-live="polite"></div>

    <section id="rankingDetailModal" class="modal hidden" aria-modal="true" role="dialog" aria-labelledby="rankingDetailTitle">
      <div class="modal-content">
        <button id="closeDetailButton" type="button" class="modal-close" aria-label="Cerrar detalle">×</button>
        <h2 id="rankingDetailTitle">Detalle de pronósticos</h2>
        <div id="rankingDetailContent" class="detail-list"></div>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="data.js"></script>
  <script src="supabase.js"></script>
  <script src="app.js"></script>
</body>
</html>
